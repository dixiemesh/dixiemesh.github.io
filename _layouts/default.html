<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }} · {{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/img/favicon-32.png' | relative_url }}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/img/favicon-16.png' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <img
          src="{{ '/assets/img/logo.png' | relative_url }}"
          alt="{{ site.title }} logo"
        />
      </a>
      <p class="tagline">{{ site.description }}</p>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Introduction</a>
        <a href="{{ '/getting-started/' | relative_url }}"{% if page.url contains 'getting-started' %} class="active"{% endif %}>Getting Started</a>
        <a href="{{ '/how-to/' | relative_url }}"{% if page.url contains 'how-to' %} class="active"{% endif %}>How To</a>
        <a href="https://live.dixiemesh.com/#/live">Live Map</a>
        <a href="{{ '/troubleshooting/' | relative_url }}"{% if page.url contains 'troubleshooting' %} class="active"{% endif %}>Troubleshooting</a>
      </nav>
    </header>
    <div class="flag-bar"></div>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>
        {{ site.title }} &middot; Powered by
        <a href="https://meshcore.io">MeshCore</a>
      </p>
      <p>
        <a href="mailto:contact@dixiemesh.com">contact@dixiemesh.com</a>
      </p>
    </footer>

    <script>
      // Open all external links in a new tab.
      document.querySelectorAll('a[href]').forEach(function (a) {
        if (a.hostname && a.hostname !== window.location.hostname) {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
      });
    </script>
  </body>
</html>
